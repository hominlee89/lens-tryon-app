<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>컬러렌즈 가상 착용</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>컬러렌즈 가상 착용</h1>
      <button id="capture-btn" title="화면 캡처">📷 캡처</button>
    </header>

    <main id="layout">
      <section id="product-panel">
        <h2>제품 리스트</h2>
        <div id="product-list"></div>
      </section>

      <section id="camera-panel">
        <div id="camera-stage">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div id="status">카메라를 시작하는 중...</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
